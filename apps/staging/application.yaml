apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-staging
  namespace: argocd
  labels:
    environment: staging
spec:
  project: default
  source:
    repoURL: https://github.com/Unnavasriteja/gitops-poc-eks.git
    targetRevision: master
    path: charts/nginx-app
    helm:
      valueFiles:
        - ../../envs/staging/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true